<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Roboto', sans-serif;
        }
        .container {
            margin-top: 100px;
        }
        .card {
            background-color: #1e1e1e;
            border: none;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            transition: transform 0.2s;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .card-title {
            color: #ffffff;
            font-weight: 500;
        }
        .card-text {
            color: #b0b0b0;
        }
        .badge {
            background-color: #bb86fc;
            color: #000;
        }
        .btn-primary {
            background-color: #03dac6;
            border: none;
            color: #000;
        }
        .btn-primary:hover {
            background-color: #018786;
            color: #fff;
        }
        h1 {
            font-weight: 700;
            margin-bottom: 50px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vibes</h1>
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">
                <div class="card p-3">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-2">
                            <h5 class="card-title mb-0">Puyo's revenge</h5>
                            <span class="badge rounded-pill">v1.0.4</span>
                        </div>
                        <p class="card-text">Pulling off a block heist from Tetris</p>
                        <div class="dropdown mt-3">
                            <button class="btn btn-primary w-100 dropdown-toggle" type="button" data-bs-toggle="dropdown" aria-expanded="false">
                                Play Version
                            </button>
                            <ul class="dropdown-menu w-100">
                                <li><a class="dropdown-item" href="Games/Puyo's Revenge/Versions/v1.0.4/Godot Inventory Manager v1.0.4.html">v1.0.4 (Latest)</a></li>
                                <li><a class="dropdown-item" href="Games/Puyo's Revenge/Versions/v1.0.3/Godot Inventory Manager v1.0.3.html">v1.0.3</a></li>
                                <li><a class="dropdown-item" href="Games/Puyo's Revenge/Versions/v1.0.2/Godot Inventory Manager v1.0.2.html">v1.0.2</a></li>
                            </ul>
                        </div>
                        <a href="puyos_revenge_versions.html" class="d-block text-center mt-3" style="color: #bb86fc; text-decoration: none;">Version history</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
